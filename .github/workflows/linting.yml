name: Pylint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Pylint (Python 3.13)
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pylint
        run: |
          pylint \
            --load-plugins=pylint_django \
            --django-settings-module=charity_platform.settings \
            charity_platform donations fundraisers pages reports tests units users verifications
