{% extends 'pages/index.html' %}
{% load crispy_forms_tags %}

{% block container %}
	<div class="container login-container my-5">
		<div class="row">
			<div class="login-title my-3 text-center col">
				<h1><span class="hero-title-collection">Вхід</span> до платформи</h1>
			</div>
		</div>

		<div class="row">
			<form method="post" style="" class="form-box">
				{% csrf_token %}
				{% for field in form %}
					<div class="form-item">
						{{ field }}
						{{ field.error_tag }}
					</div>
				{% endfor %}

				<div class=" d-flex flex-column align-items-center justify-content-between">
					<button type="submit" class="btn btn-primary px-5 ">Увійти</button>
				</div>
			</form>

		</div>

		<div class="register text-center mt-3">
			<p>або <a href="{% url 'signup' %}">зареєструйтесь</a> за посиланням!</p>
		</div>
	</div>

{% endblock %}
