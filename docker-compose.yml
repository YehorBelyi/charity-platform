services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
              python manage.py runserver 0.0.0.0:8000"

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli
    command: listen --skip-verify --forward-to web:8000/donations/webhooks/stripe/
    env_file:
      - .env.stripe
    depends_on:
      - web
    profiles:
      - stripe

  tests:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    command: pytest
    profiles:
      - test
